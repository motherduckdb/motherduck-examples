name: Catalog

on:
  pull_request:
    paths:
      - "**/README.md"
      - "catalog.schema.json"
      - "scripts/build-catalog.py"
      - "tests/test_build_catalog.py"
      - ".github/workflows/catalog.yml"
  push:
    branches:
      - main
    paths:
      - "**/README.md"
      - "catalog.schema.json"
      - "scripts/build-catalog.py"
      - "tests/test_build_catalog.py"
      - ".github/workflows/catalog.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run catalog tests
        run: uv run --with pytest --with pyyaml --with jsonschema python -m pytest tests/test_build_catalog.py -q

      - name: Build catalog preview
        run: |
          ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          mkdir -p .catalog-pages
          uv run scripts/build-catalog.py \
            --output .catalog-pages/catalog.json \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${ref}" \
            --schema-url "catalog.schema.json"
          cp catalog.schema.json .catalog-pages/catalog.schema.json

      - name: Validate catalog preview schema
        run: uv run --with check-jsonschema check-jsonschema --schemafile catalog.schema.json .catalog-pages/catalog.json

      - name: Upload catalog preview
        uses: actions/upload-artifact@v4
        with:
          name: catalog-preview
          path: .catalog-pages/

  deploy:
    name: Deploy catalog to GitHub Pages
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build Pages catalog
        run: |
          mkdir -p .catalog-pages
          uv run scripts/build-catalog.py \
            --output .catalog-pages/catalog.json \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "main" \
            --schema-url "catalog.schema.json"
          cp catalog.schema.json .catalog-pages/catalog.schema.json

      - name: Validate Pages catalog schema
        run: uv run --with check-jsonschema check-jsonschema --schemafile catalog.schema.json .catalog-pages/catalog.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .catalog-pages/

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
