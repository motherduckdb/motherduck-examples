metadata_version: 1
id: dbt-ducklake
kind: recipe
title: Run TPC-DS models on DuckLake with dbt
description: Load TPC-DS data into a DuckLake-backed dbt project and run the dbt build locally or from an on-demand Flight.
features:
  - flights
  - ducklake
categories:
  - transformation
  - lakehouse
  - orchestration
tags:
  - dbt
  - tpc-ds
standalone: true
entrypoints:
  docs: README.md
  flight: flights/create_flight.sql
  flight_source: flights/flight.py
templates:
  flight: ../templates/flights/dbt-runner
requirements:
  motherduck_token: true
  external_data: public_s3
  ducklake_database: true
  local_runtime: python
default_database: dbt_ducklake
