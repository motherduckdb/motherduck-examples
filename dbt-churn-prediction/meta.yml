metadata_version: 1
id: dbt-churn-prediction
kind: recipe
title: Build churn prediction features with dbt
description: Use dbt to build churn feature tables and run the feature refresh locally, in MotherDuck, or from a scheduled Flight.
products:
  - motherduck
  - dbt
  - flights
categories:
  - transformation
  - machine-learning
  - orchestration
tags:
  - churn
  - feature-engineering
  - dbt-duckdb
standalone: true
entrypoints:
  local: README.md
  flight: flights/create_flight.sql
  flight_source: flights/flight.py
templates:
  flight: ../templates/flights/dbt-runner
requirements:
  motherduck_token: true
  local_runtime: python
default_database: subscription_churn
default_schedule_cron: "15 7 * * *"
